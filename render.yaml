services:
  - type: web
    name: core-backend
    env: node
    rootDir: server
    # The build command runs in Render's datacenter, bypassing your local network blocks!
    buildCommand: npm install && npx prisma db push && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
