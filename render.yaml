services:
  - type: web
    name: smartlaw-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile   # Correct casing
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartlaw-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_URL
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: smartlaw-db
    plan: free
    region: singapore
